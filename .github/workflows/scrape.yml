# Scheduled source scrapes — runs scripts/scrape-cli.ts against the prod
# Supabase project on each source's natural cadence.
#
# Cadences mirror SourceConfig.scheduleCron in each source file (UTC).
# Keep them in sync: if a source's scheduleCron changes, change the
# matching cron line here too.
#
# Runtime budget per run is the GitHub-hosted runner's 6-hour hard cap.
# `timeout-minutes: 350` enforces an 8-minute safety margin under the
# cap so the runner can shut down cleanly. Three sources fit a full run
# inside this budget; the rest need a per-run --limit and accumulate
# coverage across multiple cron firings (the dedupe key on
# source_external_id makes re-scrapes idempotent — landing the same
# row twice is a no-op merge, so partial passes are safe). Coverage
# math:
#
#   doe_network:        rate=3000ms × ~10591 URLs ≈ 8.8h full
#                       → --limit=5000 per quarterly run; full corpus
#                         in ~1.5 quarters via overlap accumulation
#   doe_network_uid:    rate=3000ms × ~5101 URLs ≈ 4.25h full → fits
#                       budget. No --limit needed but capped at 5000
#                       defensively in case the corpus grows.
#   charley_project:    rate=5000ms × ~16000 URLs ≈ 22h full
#                       → --limit=3000 per monthly run; full corpus
#                         in ~5-6 months via overlap accumulation
#   project_cold_case:  rate=5000ms × ~376 URLs ≈ 31min → fits, no --limit
#   nys_dcjs:           rate=1000ms × ~177 URLs ≈ 3min → fits, no --limit
#   ca_mups:            rate=10000ms × ~3104 URLs ≈ 8.6h full
#                       → --limit=1800 per weekly run; full corpus
#                         in ~2 weeks via overlap accumulation
#   nm_dps:             rate=2000ms × ~933 URLs ≈ 31min → fits, no --limit
#   mt_mmpd:            rate=10000ms × ~165 URLs ≈ 28min → fits, no --limit
#
# When a long source needs faster coverage, the path forward is either
# a self-hosted runner (no GitHub timeout) or adding a cursor to the
# scrape-cli for resumable runs across cron firings — neither is
# urgent today.
#
# ────────────────────────────────────────────────────────────────────
# Required GitHub Actions secrets (Settings → Secrets and variables →
# Actions → New repository secret):
#   SUPABASE_URL              — same value as NEXT_PUBLIC_SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY — service-role key (NOT the anon key —
#                               the persist path bypasses RLS)
#   MAPBOX_ACCESS_TOKEN       — optional. When unset, geocoding skips
#                               and cases land with location_point=null.
# ────────────────────────────────────────────────────────────────────

name: scrape

on:
  schedule:
    # Doe Network MP — 1st of every 3rd month, 04:00 UTC (quarterly)
    - cron: '0 4 1 */3 *'
    # Doe Network UID — 15th of every 3rd month, 04:00 UTC (quarterly,
    # offset 14 days from MP so the two don't collide on Doe's bandwidth)
    - cron: '0 4 15 */3 *'
    # The Charley Project — 1st of each month, 09:00 UTC (monthly)
    - cron: '0 9 1 * *'
    # Project: Cold Case — 5th of each month, 09:00 UTC (monthly)
    - cron: '0 9 5 * *'
    # NY DCJS — daily at 05:00 UTC (matches sources/ny_dcjs.ts scheduleCron)
    - cron: '0 5 * * *'
    # CA MUPS — Saturday at 02:00 UTC (matches sources/ca_mups.ts scheduleCron)
    - cron: '0 2 * * 6'
    # NM DPS — Monday at 06:00 UTC (matches sources/nm_dps.ts scheduleCron)
    - cron: '0 6 * * 1'
    # MT DOJ MMPD — Sunday at 06:00 UTC (matches sources/mt_mmpd.ts scheduleCron)
    - cron: '0 6 * * 0'

  workflow_dispatch:
    inputs:
      source:
        description: 'Source slug to scrape'
        required: true
        type: choice
        options:
          - doe_network
          - doe_network_uid
          - charley_project
          - project_cold_case
          - nys_dcjs
          - ca_mups
          - nm_dps
          - mt_mmpd
      limit:
        description: 'Detail-URL cap (blank = use the per-source default below; 0 = no limit)'
        required: false
        type: string
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest
    # 350 = 6-hour hosted-runner cap minus 10-minute safety margin.
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          # Node 22+ required for native WebSocket. @supabase/supabase-js
          # v2.105+ (bumped in PR #43) initializes a RealtimeClient as
          # part of every createClient() call and that client checks for
          # native WebSocket on construct — Node 20 doesn't have it and
          # the constructor throws even when we never use realtime.
          # Node 22 is current LTS; the alternative was installing `ws`
          # and passing { realtime: { transport: ws } } at every createClient
          # call site, which is more invasive than the version bump.
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      # Map cron expression → source slug. workflow_dispatch passes
      # the source via input directly; scheduled runs use the cron
      # match. Per-source default limits live in this step too — the
      # workflow_dispatch input overrides when set, including the
      # explicit "0 = no limit" sentinel for ad-hoc full runs.
      - name: Resolve source + limit
        id: resolve
        env:
          DISPATCH_SOURCE: ${{ inputs.source }}
          DISPATCH_LIMIT: ${{ inputs.limit }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          set -euo pipefail
          if [ -n "${DISPATCH_SOURCE:-}" ]; then
            SOURCE="$DISPATCH_SOURCE"
          else
            case "$EVENT_SCHEDULE" in
              "0 4 1 */3 *")  SOURCE=doe_network ;;
              "0 4 15 */3 *") SOURCE=doe_network_uid ;;
              "0 9 1 * *")    SOURCE=charley_project ;;
              "0 9 5 * *")    SOURCE=project_cold_case ;;
              "0 5 * * *")    SOURCE=nys_dcjs ;;
              "0 2 * * 6")    SOURCE=ca_mups ;;
              "0 6 * * 1")    SOURCE=nm_dps ;;
              "0 6 * * 0")    SOURCE=mt_mmpd ;;
              *) echo "Unknown cron schedule: $EVENT_SCHEDULE" >&2; exit 2 ;;
            esac
          fi

          # Per-source default limits. See the runtime-budget table at
          # the top of this file for the math.
          case "$SOURCE" in
            doe_network)        DEFAULT_LIMIT=5000 ;;
            doe_network_uid)    DEFAULT_LIMIT=5000 ;;
            charley_project)    DEFAULT_LIMIT=3000 ;;
            project_cold_case)  DEFAULT_LIMIT=  ;;  # no cap
            nys_dcjs)           DEFAULT_LIMIT=  ;;  # no cap (~3min full)
            ca_mups)            DEFAULT_LIMIT=1800 ;;  # 8.6h corpus across ~2 weekly runs
            nm_dps)             DEFAULT_LIMIT=  ;;  # no cap (~31min full)
            mt_mmpd)            DEFAULT_LIMIT=  ;;  # no cap (~28min full)
          esac

          if [ -n "${DISPATCH_LIMIT:-}" ]; then
            if [ "$DISPATCH_LIMIT" = "0" ]; then
              LIMIT=  # explicit "no limit" sentinel
            else
              LIMIT="$DISPATCH_LIMIT"
            fi
          else
            LIMIT="$DEFAULT_LIMIT"
          fi

          echo "source=$SOURCE"  >> "$GITHUB_OUTPUT"
          echo "limit=$LIMIT"    >> "$GITHUB_OUTPUT"
          echo "Resolved: source=$SOURCE limit=${LIMIT:-<none>}"

      - name: Run scrape
        env:
          # scrape-cli reads either NEXT_PUBLIC_SUPABASE_URL or SUPABASE_URL
          # (in that order). Set both to the same value so this works
          # regardless of which one the persist path picks up.
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          ARGS="--source=${{ steps.resolve.outputs.source }}"
          if [ -n "${{ steps.resolve.outputs.limit }}" ]; then
            ARGS="$ARGS --limit=${{ steps.resolve.outputs.limit }}"
          fi
          echo "+ npm run scrape -- $ARGS"
          npm run scrape -- $ARGS
